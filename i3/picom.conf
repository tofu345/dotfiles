backend = "xrender";
vsync = true;
blur-background = false;
shadow = false;

rules: (
    {
        match = "class_g = 'dwm'";
        opacity = 0.925;
    },
    {
        match = "class_g = 'Dunst'";
        opacity = 0.95;
    },
    {
        match = "window_type = 'popup_menu' || window_type = 'menu' || window_type = 'dropdown_menu' || window_type = 'utility'";
        blur-background = false;
        shadow = false;
    },
)
